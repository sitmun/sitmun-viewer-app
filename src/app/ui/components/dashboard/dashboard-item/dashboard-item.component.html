<div class="dashboard-item" [ngClass]="{'dashboard-item-maintenance': item.isUnavailable}">
  <div class="dashboard-item-image">
    <button (click)="navigateToMap(item.id)">
      <img [src]="item.logo || 'assets/img/card-no-image.svg'" />
    </button>
  </div>

  <div class="mobile-card dashboard-item-content" [ngClass]="item.isUnavailable ? 'dashboard-item-maintenance' : 'dashboard-item-active'">
    <mat-expansion-panel>
      <mat-expansion-panel-header>
       <ng-container *ngTemplateOutlet="panelHeader"></ng-container>
      </mat-expansion-panel-header>

      <ng-container *ngTemplateOutlet="cardContent"></ng-container>
    </mat-expansion-panel>
  </div>

  <div class="desktop-card dashboard-item-content" [ngClass]="item.isUnavailable ? 'dashboard-item-maintenance' : 'dashboard-item-active'">
    <ng-container *ngTemplateOutlet="panelHeader"></ng-container>
    <ng-container *ngTemplateOutlet="cardContent"></ng-container>
  </div>
</div>

<ng-template #panelHeader>
  <div class="dashboard-item-content-header">
    <button (click)="navigateToMap(item.id)">
      <h3 class="dashboard-item-title"> {{item.title}} {{item.name}} </h3>
    </button>
    <div class="dashboard-item-dot">
      <button class="dot" (click)="navigateToApplicationDetails(item.id)">
        <img src="assets/img/dot.svg"/>
      </button>
    </div>
  </div>
</ng-template>

<ng-template #cardContent>
  <p class="dashboard-item-description" *ngIf="item.description">
    {{ item.description && item.description.length > DESCRIPTION_MAX_CHARACTER
        ? (item.description.slice(0, DESCRIPTION_MAX_CHARACTER) + '...')
        : item.description }}
  </p>

  <p class="dashboard-item-warning" *ngIf="item.maintenanceInformation && item.maintenanceInformation.length > 0">
    {{ item.maintenanceInformation }}
  </p>

  <p class="dashboard-item-maintenanceInfo" *ngIf="item.isUnavailable">
    {{ 'dashboardPage.maintenance' | translate }}
  </p>

  <button class="dashboard-item-moreDetails" *ngIf="!item.isUnavailable" (click)="navigateToApplicationDetails(item.id)">
    {{ 'dashboardPage.moreDetails' | translate }} >
  </button>
</ng-template>
